<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MengAssist</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700&display=swap" rel="stylesheet">
<!-- 1. Add Supabase Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #0d0d0f; --surface: #141417; --surface-hover: #1c1c21; --border: #2a2a30;
  --accent: #7fff6e; --accent-dim: rgba(127,255,110,0.12); --text: #e8e8e8; --muted: #6b6b78;
  --radius: 14px; --mono: 'JetBrains Mono', monospace; --display: 'Syne', sans-serif;
  --chat-width: 800px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--mono); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; padding-top: env(safe-area-inset-top); }

.box-inner { width: 100%; max-width: var(--chat-width); margin: 0 auto; display: flex; }

/* Header */
header { padding: 13px 16px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; z-index: 10; }
header .box-inner { justify-content: space-between; align-items: center; }
.header-left { display: flex; align-items: center; gap: 12px; }
.menu-btn { background: none; border: none; color: var(--text); cursor: pointer; padding: 4px; display: flex; }
.logo { font-family: var(--display); font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.35; transform:scale(.65); } }
.cfg-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: var(--mono); font-size: 10px; padding: 5px 12px; border-radius: 6px; cursor: pointer; letter-spacing: .8px; text-transform: uppercase; transition: .2s; }
.cfg-btn:hover, .cfg-btn.active { border-color: var(--accent); color: var(--accent); }

/* Sidebar */
#sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; opacity: 0; pointer-events: none; transition: opacity .3s; }
#sidebar-overlay.open { opacity: 1; pointer-events: auto; }
#sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 260px; background: var(--surface); border-right: 1px solid var(--border); z-index: 100; transform: translateX(-100%); transition: transform .3s ease; display: flex; flex-direction: column; }
#sidebar.open { transform: translateX(0); }
.side-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;}
.side-header h2 { font-size: 12px; font-family: var(--display); letter-spacing: 1px; text-transform: uppercase; }
.btn-new { background: var(--accent); color: #000; border: none; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; font-family: var(--mono);}
.chat-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 4px; }
.history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 11px; color: var(--muted); transition: .2s; }
.history-item:hover, .history-item.active { border-color: var(--accent); color: var(--text); }
.history-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; }
.del-chat { background: none; border: none; color: #ff6e6e; cursor: pointer; opacity: 0.5; padding: 4px; }
.del-chat:hover { opacity: 1; }
.sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }

/* Config Panel */
#config { background: var(--surface); border-bottom: 1px solid var(--border); max-height: 0; overflow: hidden; transition: max-height .35s ease, padding .35s ease; flex-shrink: 0; display: flex; justify-content: center; }
#config.open { max-height: 600px; padding: 18px 16px; }
#config .box-inner { flex-direction: column; }
.cfg-grid { display: flex; flex-direction: column; gap: 12px; }
.cfg-row { display: flex; gap: 8px; align-items: center; }
.cfg-field { display: flex; flex-direction: column; gap: 5px; flex: 1; }
.cfg-field label { font-size: 9px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted); }
.cfg-field input[type="text"], .cfg-field input[type="password"], .cfg-field select { background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 8px 11px; border-radius: 8px; outline: none; transition: .2s; width: 100%; }
.cfg-field input:focus, .cfg-field select:focus { border-color: var(--accent); }
.cfg-check { display: flex; align-items: center; gap: 8px; padding-top: 6px; }
.cfg-check input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
.cfg-check label { font-size: 11px; color: var(--muted); cursor: pointer; }
.cfg-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

.btn-save { background: var(--accent); color: #0d0d0f; border: none; font-family: var(--mono); font-size: 11px; font-weight: 600; padding: 9px 20px; border-radius: 8px; cursor: pointer; }
.btn-ghost { background: none; border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 11px; padding: 9px 14px; border-radius: 8px; cursor: pointer; transition: .2s; }
.btn-ghost:hover { border-color: var(--accent); }
.btn-danger:hover { border-color: #ff6e6e; color: #ff6e6e; }

/* Modals */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; padding: 20px; }
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 600px; padding: 20px; display: flex; flex-direction: column; gap: 16px; transform: translateY(10px); transition: transform .2s; }
.modal-overlay.open .modal-box { transform: translateY(0); }
.modal-title { font-size: 13px; font-weight: 700; font-family: var(--display); color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
.modal-box textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 14px; border-radius: 8px; outline: none; resize: vertical; min-height: 250px; line-height: 1.5; }
.modal-box textarea:focus { border-color: var(--accent); }
.modal-slider-group { display: flex; flex-direction: column; gap: 6px; }
.modal-slider-group label { font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; }
.modal-slider-group input[type="range"] { accent-color: var(--accent); width: 100%; }

/* Auth Overlay */
#auth-overlay { position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; transition: opacity 0.3s; }
#auth-box { background:var(--surface); padding:30px; border-radius:12px; border:1px solid var(--border); width:100%; max-width: 320px; display:flex; flex-direction:column; gap:15px; }
#auth-box input { padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-family: var(--mono); font-size: 12px; outline: none; }
#auth-box input:focus { border-color: var(--accent); }

/* Chat Box */
#chat-box { flex: 1; overflow-y: auto; padding: 20px 14px 10px; display: flex; flex-direction: column; align-items: center; gap: 14px; scroll-behavior: smooth; overscroll-behavior: contain; }
#chat-box::-webkit-scrollbar { width: 3px; }
#chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); padding-bottom: 80px; animation: fadein .5s ease; }
.empty-glyph { font-size: 30px; opacity: .22; }
.empty p { font-size: 12px; opacity: .4; text-align: center; line-height: 1.75; }
@keyframes fadein { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* Messages */
.msg { display: flex; gap: 10px; width: 100%; max-width: var(--chat-width); animation: slidein .25s ease; }
.msg.user { flex-direction: row-reverse; }
@keyframes slidein { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
.avatar { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 2px; user-select: none; }
.msg.user .avatar { background: var(--accent-dim); border: 1px solid rgba(127,255,110,.2); color: var(--accent); }
.msg.ai   .avatar { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
.msg-body { display: flex; flex-direction: column; gap: 5px; max-width: calc(100% - 42px); min-width: 0; width: 100%; }
.msg.user .msg-body { align-items: flex-end; }

/* Attached Images in Chat */
.msg-images { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
.msg-images img { max-width: 150px; max-height: 150px; border-radius: 8px; border: 1px solid var(--border); object-fit: cover; }

.bubble { padding: 11px 14px; border-radius: var(--radius); font-size: 13px; line-height: 1.75; word-break: break-word; white-space: pre-wrap; transition: opacity .18s ease; }
.msg.user .bubble { background: #1e1e26; border: 1px solid var(--border); border-top-right-radius: 4px; }
.msg.ai .bubble { background: var(--surface); border: 1px solid var(--border); border-top-left-radius: 4px; width: 100%; }

/* Edit Inline */
.edit-wrap { display: flex; flex-direction: column; gap: 8px; width: 100%; min-width: 240px; }
.edit-wrap textarea { background: var(--bg); border: 1px solid var(--accent); color: var(--text); border-radius: 8px; padding: 12px; font-family: var(--mono); font-size: 13px; resize: vertical; outline: none; line-height: 1.5; min-height: 120px; }
.edit-actions { display: flex; gap: 6px; justify-content: flex-end; }
.edit-actions button { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 6px; font-family: var(--mono); font-size: 10px; cursor: pointer; }
.edit-actions .btn-save-edit { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* Markdown & Code Blocks */
.bubble h1 { font-size: 18px; margin: 12px 0 6px 0; color: var(--accent); }
.bubble h2 { font-size: 16px; margin: 10px 0 5px 0; }
.bubble h3 { font-size: 14px; margin: 8px 0 4px 0; }
.bubble strong { color: #fff; font-weight: 600; }
.bubble em { color: #ccc; font-style: italic; }
.bubble li { margin-left: 20px; list-style-type: disc; display: list-item; }
.bubble code { background: rgba(127,255,110,.08); color: var(--accent); padding: 1px 5px; border-radius: 4px; font-size: 11.5px; }
.code-block { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin: 8px 0; background: #0a0a0c; width: 100%; }
.code-header { display: flex; justify-content: space-between; align-items: center; background: #16161a; padding: 6px 12px; border-bottom: 1px solid var(--border); }
.code-lang { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.code-actions { display: flex; gap: 8px; }
.code-btn { background: none; border: none; color: var(--muted); font-family: var(--mono); font-size: 10px; cursor: pointer; transition: color .2s; }
.code-btn:hover { color: var(--text); }
.code-block pre { margin: 0; padding: 11px; overflow-x: auto; font-size: 11.5px; line-height: 1.6; white-space: pre; transition: max-height 0.3s ease, padding 0.3s ease; max-height: 2000px; }
.code-block pre code { background: none; padding: 0; color: var(--text); }
.code-block.collapsed pre { max-height: 0; padding-top: 0; padding-bottom: 0; overflow: hidden; opacity: 0; }

.thinking-wrap { margin-bottom: 8px; }
details.think { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
details.think summary { padding: 7px 11px; font-size: 10px; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 6px; background: rgba(127,255,110,.03); user-select: none; list-style: none; }
details.think summary::-webkit-details-marker { display: none; }
details.think summary::before { content: '▶'; font-size: 8px; transition: transform .2s; }
details.think[open] summary::before { transform: rotate(90deg); }
.think-body { padding: 10px 12px; font-size: 11.5px; color: var(--muted); line-height: 1.7; white-space: pre-wrap; border-top: 1px solid var(--border); word-break: break-word; }

/* Controls */
.msg-controls { display: flex; align-items: center; gap: 6px; padding: 0 2px; flex-wrap: wrap; }
.msg.user .msg-controls { justify-content: flex-end; }
.ctrl-btn { background: none; border: none; color: var(--muted); font-family: var(--mono); font-size: 10px; padding: 3px 7px; border-radius: 5px; cursor: pointer; transition: .2s; letter-spacing: .3px; }
.ctrl-btn:hover:not(:disabled) { color: var(--text); background: var(--border); }
.ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.ctrl-btn.ok { color: var(--accent); }
.ver-pager { display: flex; align-items: center; gap: 2px; }
.ver-badge { font-size: 10px; color: var(--muted); letter-spacing: .4px; user-select: none; padding: 0 4px; }
.ver-badge b { color: var(--accent); font-weight: 600; }
.typing-dots { display:flex; gap:5px; align-items:center; padding: 2px 0; }
.typing-dots span { width:6px; height:6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }

/* Input area */
#input-area { padding: 10px 14px 14px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
#input-area .box-inner { flex-direction: column; }
.attachments-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.attach-chip { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 10px; display: flex; align-items: center; gap: 6px; color: var(--muted); }
.attach-chip img { width: 16px; height: 16px; object-fit: cover; border-radius: 3px; }
.attach-chip button { background: none; border: none; color: #ff6e6e; cursor: pointer; font-size: 12px; line-height: 1; }
.input-wrap { display: flex; gap: 8px; align-items: flex-end; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 8px 8px 8px 12px; transition: .2s; }
.input-wrap:focus-within { border-color: var(--accent); }
#user-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.55; resize: none; max-height: 130px; min-height: 22px; overflow-y: auto; }
#user-input::placeholder { color: var(--muted); }
.icon-btn { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 6px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: .2s; }
.icon-btn:hover { color: var(--text); background: var(--surface); }
.send-btn { background: var(--accent); border: none; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: .2s; }
.send-btn:hover:not(:disabled) { opacity: .85; transform: scale(1.04); }
.send-btn:active:not(:disabled) { transform: scale(.95); }
.send-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }
.send-btn svg { width: 15px; height: 15px; }

/* Toast */
#toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(12px); background: #1c1c1f; border: 1px solid var(--border); color: var(--text); font-size: 11px; padding: 9px 16px; border-radius: 8px; opacity: 0; pointer-events: none; transition: all .25s; white-space: nowrap; max-width: 88vw; text-align: center; z-index: 999; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.err { color: #ff9999; border-color: #ff6e6e44; background: #1e1515; }
#toast.ok  { color: var(--accent); border-color: rgba(127,255,110,.2); background: #111a11; }
</style>
</head>
<body>

<!-- Authentication Overlay -->
<div id="auth-overlay">
  <div class="logo"><div class="dot"></div>MengAssist</div>
  <div id="auth-box">
    <p style="font-size: 12px; text-align: center; color: var(--muted);">Sign in to access your chats securely</p>
    <input type="email" id="auth-email" placeholder="Email Address">
    <input type="password" id="auth-password" placeholder="Password">
    <button class="btn-save" onclick="handleLogin()">Login</button>
    <button class="btn-ghost" onclick="handleSignup()">Sign Up</button>
    <div id="auth-error" style="color:#ff6e6e; font-size:11px; text-align:center;"></div>
  </div>
</div>

<header>
  <div class="box-inner">
    <div class="header-left">
      <button class="menu-btn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
      <div class="logo"><div class="dot"></div>MengAssist</div>
    </div>
    <button class="cfg-btn" id="cfg-toggle" onclick="toggleConfig()">⚙ Config</button>
  </div>
</header>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div id="sidebar">
  <div class="side-header">
    <h2>History</h2>
    <button class="btn-new" onclick="startNewChat()">+ New</button>
  </div>
  <div class="chat-list" id="chat-list"></div>
  <div class="sidebar-footer">
    <button class="btn-ghost btn-danger" style="width: 100%;" onclick="handleLogout()">Log Out</button>
  </div>
</div>

<div id="config">
  <div class="box-inner">
    <div class="cfg-grid">
      <div class="cfg-field">
        <label>API Base URL</label>
        <input type="text" id="cfg-url" placeholder="https://api.openai.com/v1/chat/completions" />
      </div>
      <div class="cfg-field">
        <label>API Key</label>
        <div class="cfg-row">
          <input type="password" id="cfg-key" placeholder="sk-..." />
          <button class="btn-ghost" id="btn-connect" onclick="connectAPI()">Connect</button>
        </div>
      </div>
      <div class="cfg-field">
        <label>Model</label>
        <div id="model-container">
          <input type="text" id="cfg-model" placeholder="gpt-4o" />
        </div>
      </div>
      <div class="cfg-field">
        <div class="cfg-check">
          <input type="checkbox" id="cfg-thinking" />
          <label for="cfg-thinking">Thinking model — show reasoning steps</label>
        </div>
      </div>
    </div>
    <div class="cfg-actions">
      <button class="btn-ghost" onclick="openModal('modal-sys')">System Prompt</button>
      <button class="btn-ghost" onclick="openModal('modal-param')">Parameters</button>
      <button class="btn-save" style="margin-left: auto;" onclick="saveConfig()">Save Config</button>
      <button class="btn-ghost btn-danger" onclick="clearCurrentChat()">Clear Chat</button>
    </div>
  </div>
</div>

<!-- Modals -->
<div id="modal-container" class="modal-overlay" onclick="if(event.target===this) closeModal()">
  <div id="modal-sys" class="modal-box" style="display:none;">
    <div class="modal-title">System Prompt</div>
    <textarea id="temp-system" placeholder="You are a helpful assistant."></textarea>
    <div class="edit-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveSystem()">Save</button>
    </div>
  </div>
  <div id="modal-param" class="modal-box" style="display:none;">
    <div class="modal-title">Generation Settings</div>
    <div class="modal-slider-group">
      <label>Temperature <span id="val-temp">1.0</span></label>
      <input type="range" id="temp-temp" min="0" max="2" step="0.1" value="1.0" oninput="document.getElementById('val-temp').textContent=this.value" />
    </div>
    <div class="modal-slider-group">
      <label>Top P <span id="val-topp">1.0</span></label>
      <input type="range" id="temp-topp" min="0" max="1" step="0.05" value="1.0" oninput="document.getElementById('val-topp').textContent=this.value" />
    </div>
    <div class="edit-actions" style="margin-top:8px;">
      <button onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveParams()">Save</button>
    </div>
  </div>
</div>

<div id="chat-box"></div>

<div id="input-area">
  <div class="box-inner">
    <div id="attachments-preview" class="attachments-preview"></div>
    <div class="input-wrap">
      <input type="file" id="file-upload" multiple style="display:none" onchange="handleFiles(event)">
      <button class="icon-btn" onclick="document.getElementById('file-upload').click()">📎</button>
      <textarea id="user-input" placeholder="Type a message..." rows="1" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0d0d0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>

// ==========================================

let CFG = {
  url: '', key: '', model: '', 
  temp: 1.0, topp: 1.0, 
  system: 'You are a helpful assistant.', thinking: false
};

let chats = []; 
let currentChatId = null;
let turns = [];
let loading = false;
let filesLoadingCount = 0; 
let pendingAttachments = [];

// ==========================================
// 2. AUTHENTICATION LOGIC
// ==========================================
async function handleLogin() {
  const email = document.getElementById('auth-email').value;
  const password = document.getElementById('auth-password').value;
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) document.getElementById('auth-error').textContent = error.message;
}

async function handleSignup() {
  const email = document.getElementById('auth-email').value;
  const password = document.getElementById('auth-password').value;
  const { data, error } = await supabase.auth.signUp({ email, password });
  if (error) {
    document.getElementById('auth-error').textContent = error.message;
  } else {
    document.getElementById('auth-error').textContent = "Success! You can now log in.";
  }
}

async function handleLogout() {
  await supabase.auth.signOut();
  window.location.reload();
}

// Listen for Auth changes. If logged in, fetch database data.
supabase.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    currentUser = session.user;
    document.getElementById('auth-overlay').style.display = 'none';
    await initAppData(); 
  } else {
    currentUser = null;
    document.getElementById('auth-overlay').style.display = 'flex';
  }
});

// Bind Enter key to chat input
document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ==========================================
// 3. DATABASE SYNCING
// ==========================================
async function initAppData() {
  // A. Fetch User Config
  const { data: settingsData } = await supabase
    .from('settings')
    .select('config')
    .eq('user_id', currentUser.id)
    .single();

  if (settingsData && settingsData.config) {
    CFG = { ...CFG, ...settingsData.config };
  }
  
  document.getElementById('cfg-url').value = CFG.url || '';
  document.getElementById('cfg-key').value = CFG.key || '';
  document.getElementById('cfg-model').value = CFG.model || '';
  document.getElementById('cfg-thinking').checked = CFG.thinking || false;
  
  // B. Fetch Chats
  const { data: chatsData } = await supabase
    .from('chats')
    .select('*')
    .order('updated_at', { ascending: false });

  if (chatsData) chats = chatsData;

  if (chats.length > 0) loadChat(chats[0].id); 
  else startNewChat();
  
  if (!CFG.url || !CFG.key || !CFG.model) toggleConfig();
}

async function syncSettingsToDB() {
  if (!currentUser) return;
  await supabase.from('settings').upsert({ 
    user_id: currentUser.id, 
    config: CFG 
  });
}

// ─── Attachments ──────────────────────────────────────────
async function handleFiles(event) {
  const files = event.target.files;
  for(let file of files) {
    filesLoadingCount++;
    document.getElementById('send-btn').disabled = true;
    renderAttachments(); 
    
    if (file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = (e) => {
        pendingAttachments.push({ type: 'image', name: file.name, data: e.target.result });
        finishFileLoad();
      };
      reader.readAsDataURL(file);
    } else {
      const text = await file.text();
      pendingAttachments.push({ type: 'text', name: file.name, data: text });
      finishFileLoad();
    }
  }
  event.target.value = ''; 
}

function finishFileLoad() {
  filesLoadingCount--;
  if (filesLoadingCount <= 0) {
    filesLoadingCount = 0;
    document.getElementById('send-btn').disabled = false;
  }
  renderAttachments();
}

function renderAttachments() {
  const container = document.getElementById('attachments-preview');
  container.innerHTML = '';
  
  pendingAttachments.forEach((att, idx) => {
    const chip = el('div', 'attach-chip');
    if (att.type === 'image') chip.innerHTML = `<img src="${att.data}"> ${att.name}`;
    else chip.innerHTML = `📄 ${att.name}`;
    const btn = el('button'); btn.textContent = '×';
    btn.onclick = () => { pendingAttachments.splice(idx, 1); renderAttachments(); };
    chip.appendChild(btn); container.appendChild(chip);
  });

  if (filesLoadingCount > 0) {
    const loadingChip = el('div', 'attach-chip');
    loadingChip.textContent = '⏳ Loading file...';
    container.appendChild(loadingChip);
  }
}

// ─── API Connection & Settings ────────────────────────────
async function connectAPI() {
  const urlBase = document.getElementById('cfg-url').value.trim(), apiKey = document.getElementById('cfg-key').value.trim();
  const btn = document.getElementById('btn-connect');
  if (!urlBase) return toast('Please enter a Base URL', 'err');
  btn.textContent = '...'; btn.disabled = true;
  let modelsUrl = urlBase;
  if (modelsUrl.endsWith('/chat/completions')) modelsUrl = modelsUrl.replace('/chat/completions', '/models');
  else if (!modelsUrl.endsWith('/models')) modelsUrl = modelsUrl.replace(/\/$/, '') + '/models';

  try {
    const res = await fetch(modelsUrl, { method: 'GET', headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' } });
    if (!res.ok) throw new Error('Invalid Key or CORS Error');
    const data = await res.json();
    if (data.data && Array.isArray(data.data)) {
      const sel = document.createElement('select'); sel.id = 'cfg-model';
      data.data.forEach(m => { const opt = document.createElement('option'); opt.value = m.id; opt.textContent = m.id; if (m.id === CFG.model) opt.selected = true; sel.appendChild(opt); });
      document.getElementById('model-container').innerHTML = ''; document.getElementById('model-container').appendChild(sel);
      toast('Connected! Models loaded.', 'ok');
    } else throw new Error('Unrecognized response format');
  } catch(err) {
    toast(err.message, 'err');
    const inp = document.createElement('input'); inp.type = 'text'; inp.id = 'cfg-model'; inp.value = CFG.model; inp.placeholder = 'gpt-4o';
    document.getElementById('model-container').innerHTML = ''; document.getElementById('model-container').appendChild(inp);
  }
  btn.textContent = 'Connect'; btn.disabled = false;
}

function openModal(id) {
  document.getElementById('modal-container').classList.add('open');
  document.querySelectorAll('.modal-box').forEach(el => el.style.display = 'none'); document.getElementById(id).style.display = 'flex';
  if (id === 'modal-sys') document.getElementById('temp-system').value = CFG.system;
  else if (id === 'modal-param') { document.getElementById('temp-temp').value = CFG.temp; document.getElementById('val-temp').textContent = CFG.temp.toFixed(1); document.getElementById('temp-topp').value = CFG.topp; document.getElementById('val-topp').textContent = CFG.topp.toFixed(2); }
}
function closeModal() { document.getElementById('modal-container').classList.remove('open'); }

async function saveSystem() { 
  CFG.system = document.getElementById('temp-system').value.trim(); 
  await syncSettingsToDB();
  closeModal(); toast('System Prompt Saved ✓', 'ok'); 
}

async function saveParams() { 
  CFG.temp = parseFloat(document.getElementById('temp-temp').value); 
  CFG.topp = parseFloat(document.getElementById('temp-topp').value); 
  await syncSettingsToDB();
  closeModal(); toast('Settings Saved ✓', 'ok'); 
}

function toggleSidebar(force) {
  const sb = document.getElementById('sidebar'), ov = document.getElementById('sidebar-overlay');
  const isOpen = force !== undefined ? force : !sb.classList.contains('open');
  if (isOpen) { sb.classList.add('open'); ov.classList.add('open'); renderSidebar(); } else { sb.classList.remove('open'); ov.classList.remove('open'); }
}
function renderSidebar() {
  const list = document.getElementById('chat-list'); list.innerHTML = '';
  chats.forEach(c => {
    const div = el('div', 'history-item' + (c.id === currentChatId ? ' active' : ''));
    div.onclick = () => loadChat(c.id); div.innerHTML = `<span>${esc(c.title || 'New Chat')}</span>`;
    const delBtn = el('button', 'del-chat'); delBtn.innerHTML = '✕'; delBtn.onclick = (e) => delChat(e, c.id);
    div.appendChild(delBtn); list.appendChild(div);
  });
}
function toggleConfig() { document.getElementById('config').classList.toggle('open'); document.getElementById('cfg-toggle').classList.toggle('active'); }

async function saveConfig() {
  CFG.url = document.getElementById('cfg-url').value.trim(); 
  CFG.key = document.getElementById('cfg-key').value.trim(); 
  CFG.model = document.getElementById('cfg-model').value.trim(); 
  CFG.thinking = document.getElementById('cfg-thinking').checked;
  await syncSettingsToDB();
  toggleConfig(); toast('Config saved to Cloud ✓', 'ok');
}

// ─── Data Management ──────────────────────────────────────
async function saveState() {
  if (turns.length === 0 || !currentUser) return;
  
  if (!currentChatId) {
    currentChatId = Date.now().toString();
    let textTitle = turns[0].content || "Image Upload";
    const title = textTitle.substring(0, 30) + (textTitle.length > 30 ? '...' : '');
    chats.unshift({ id: currentChatId, title, turns: [] });
  }
  const chatIndex = chats.findIndex(c => c.id === currentChatId);
  if (chatIndex > -1) { 
    chats[chatIndex].turns = turns; 
    
    // Save to Supabase DB
    await supabase.from('chats').upsert({
      id: currentChatId,
      user_id: currentUser.id,
      title: chats[chatIndex].title,
      turns: turns,
      updated_at: new Date().toISOString()
    });
  }
  renderSidebar();
}

function startNewChat() { currentChatId = null; turns = []; renderAll(); renderSidebar(); toggleSidebar(false); }
function loadChat(id) {
  const chat = chats.find(c => c.id === id);
  if (chat) { currentChatId = id; turns = chat.turns.map(t => ({...t, _editing: false})); renderAll(); renderSidebar(); toggleSidebar(false); }
}
async function delChat(e, id) { 
  e.stopPropagation(); 
  chats = chats.filter(c => c.id !== id); 
  await supabase.from('chats').delete().eq('id', id);
  if (currentChatId === id) startNewChat(); else renderSidebar(); 
}
async function clearCurrentChat() { turns = []; await saveState(); toggleConfig(); renderAll(); }

// ─── Messaging & API Payload ──────────────────────────────
function buildMessages(upToTurnIdx = null) {
  const list = [{ role: 'system', content: CFG.system }];
  const end = upToTurnIdx !== null ? upToTurnIdx : turns.length;
  for (let i = 0; i < end; i++) {
    const t = turns[i];
    if (t.role === 'user') {
      if (t.images && t.images.length > 0) {
        let contentArr = [];
        if (t.content && t.content.trim() !== "") {
          contentArr.push({ type: 'text', text: t.content });
        }
        t.images.forEach(img => contentArr.push({ type: 'image_url', image_url: { url: img } }));
        list.push({ role: 'user', content: contentArr });
      } else {
        list.push({ role: 'user', content: t.content });
      }
    } else {
      list.push({ role: 'assistant', content: t.versions[t.idx] });
    }
  }
  return list;
}

async function sendMessage() {
  const inp = document.getElementById('user-input'); 
  let text = inp.value.trim();
  
  const textFiles = pendingAttachments.filter(a => a.type === 'text');
  textFiles.forEach(tf => { text += `\n\n--- File: ${tf.name} ---\n${tf.data}`; });
  const images = pendingAttachments.filter(a => a.type === 'image').map(a => a.data);
  
  if (!text && images.length === 0) return;
  if (loading || filesLoadingCount > 0) return;
  if (!CFG.url || !CFG.key || !CFG.model) { toggleConfig(); toast('Fill in config first', 'err'); return; }
  
  turns.push({ role: 'user', content: text, images: images.length > 0 ? images : null }); 
  await saveState();
  
  inp.value = ''; autoResize(inp); 
  pendingAttachments = []; renderAttachments();
  renderAll();
  await callAPI(false, null);
}

// ─── Core API call ────────────────────────────────────────
async function callAPI(isRegen, regenIdx) {
  loading = true; document.getElementById('send-btn').disabled = true;
  const msgUpTo = isRegen ? regenIdx : null; const messages = buildMessages(msgUpTo);
  if (isRegen) turns[regenIdx]._loading = true; else turns.push({ role: 'ai', _typing: true });
  renderAll();

  let content = '', thinking = '';
  try {
    const res = await fetch(CFG.url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${CFG.key}` },
      body: JSON.stringify({ model: CFG.model, messages, temperature: CFG.temp, top_p: CFG.topp })
    });
    if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error?.message || `HTTP ${res.status}`);
    const data = await res.json();
    content  = data.choices?.[0]?.message?.content || '';
    thinking = data.choices?.[0]?.message?.reasoning_content || '';
    const tm = content.match(/^<think>([\s\S]*?)<\/think>\s*/);
    if (tm) { thinking = tm[1].trim(); content = content.slice(tm[0].length).trim(); }
  } catch (err) {
    toast('Error: ' + err.message, 'err');
    if (isRegen) delete turns[regenIdx]._loading; else { turns = turns.filter(t => !t._typing); if (turns.length && turns[turns.length-1].role === 'user') turns.pop(); }
    loading = false; document.getElementById('send-btn').disabled = false; await saveState(); renderAll(); return;
  }

  if (isRegen) { delete turns[regenIdx]._loading; turns[regenIdx].versions.push(content); turns[regenIdx].thinkVersions.push(thinking); turns[regenIdx].idx = turns[regenIdx].versions.length - 1; }
  else { turns = turns.filter(t => !t._typing); turns.push({ role: 'ai', versions: [content], thinkVersions: [thinking], idx: 0 }); }
  loading = false; document.getElementById('send-btn').disabled = false; await saveState(); renderAll();
}

// ─── Edit & Paging ────────────────────────────────────────
function startEdit(idx) { turns[idx]._editing = true; renderAll(true); }
function cancelEdit(idx) { turns[idx]._editing = false; renderAll(true); }
async function submitEdit(idx, newText) { if (!newText.trim()) return cancelEdit(idx); turns = turns.slice(0, idx); turns.push({ role: 'user', content: newText.trim() }); await saveState(); renderAll(); await callAPI(false, null); }
async function prevVersion(idx) { const t = turns[idx]; if (!t || t.role !== 'ai') return; if (t.idx > 0) { t.idx--; await saveState(); renderAll(true); } }
async function nextVersion(idx) { const t = turns[idx]; if (!t || t.role !== 'ai') return; if (t.idx < t.versions.length - 1) { t.idx++; await saveState(); renderAll(true); } }
async function regenMessage(idx) { const lastAiIdx = turns.findLastIndex(x => x.role === 'ai'); if (idx !== lastAiIdx) { toast('Can only regenerate last message', 'err'); return; } if (loading) return; await callAPI(true, idx); }

// ─── UI Rendering ─────────────────────────────────────────
function renderAll(skipScroll = false) {
  const box = document.getElementById('chat-box'); box.innerHTML = '';
  if (turns.length === 0) { box.innerHTML = `<div class="empty"><div class="empty-glyph">◈</div><p>Configure your API above,<br>then start chatting.</p></div>`; return; }
  turns.forEach((t, i) => box.appendChild(t.role === 'user' ? makeUserMsg(t, i) : makeAiMsg(t, i)));
  if (!skipScroll) scrollBottom();
}

function makeUserMsg(t, i) {
  const row = el('div', 'msg user'), av = el('div', 'avatar'); av.textContent = '✦'; const body = el('div', 'msg-body');
  if (t._editing) {
    const wrap = el('div', 'edit-wrap'), ta = el('textarea'); ta.value = t.content;
    const actions = el('div', 'edit-actions');
    const cancelBtn = el('button'); cancelBtn.textContent = 'Cancel'; cancelBtn.onclick = () => cancelEdit(i);
    const saveBtn = el('button', 'btn-save-edit'); saveBtn.textContent = 'Save & Submit'; saveBtn.onclick = () => submitEdit(i, ta.value);
    actions.append(cancelBtn, saveBtn); wrap.append(ta, actions); body.appendChild(wrap);
  } else {
    if (t.images && t.images.length > 0) {
      const imgWrap = el('div', 'msg-images');
      t.images.forEach(src => { const img = el('img'); img.src = src; imgWrap.appendChild(img); });
      body.appendChild(imgWrap);
    }
    const bubble = el('div', 'bubble'); bubble.innerHTML = fmt(t.content);
    const controls = el('div', 'msg-controls'), editBtn = el('button', 'ctrl-btn'); editBtn.textContent = '✎ edit'; editBtn.onclick = () => startEdit(i);
    controls.append(editBtn, mkCopy(t.content)); body.append(bubble, controls);
  }
  row.append(body, av); return row;
}

function makeAiMsg(t, i) {
  const row = el('div', 'msg ai'), av = el('div', 'avatar'); av.textContent = '◈'; const body = el('div', 'msg-body'); const bubble = el('div', 'bubble');
  if (t._typing || t._loading) { bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>'; body.append(bubble); row.append(av, body); return row; }

  const content = t.versions[t.idx], thinking = t.thinkVersions[t.idx], total = t.versions.length;
  if (CFG.thinking && thinking) {
    const wrap = el('div', 'thinking-wrap');
    wrap.innerHTML = `<details class="think"><summary>Reasoning</summary><div class="think-body">${esc(thinking)}</div></details>`;
    bubble.appendChild(wrap);
  }
  const txt = el('span', ''); txt.innerHTML = fmt(content); bubble.appendChild(txt);

  const controls = el('div', 'msg-controls');
  if (total > 1) {
    const pager = el('div', 'ver-pager');
    const btnPrev = el('button', 'ctrl-btn'); btnPrev.textContent = '❮'; if (t.idx === 0) btnPrev.disabled = true; btnPrev.onclick = () => prevVersion(i);
    const badge = el('span', 'ver-badge'); badge.innerHTML = `<b>${t.idx + 1}</b>/${total}`;
    const btnNext = el('button', 'ctrl-btn'); btnNext.textContent = '❯'; if (t.idx === total - 1) btnNext.disabled = true; btnNext.onclick = () => nextVersion(i);
    pager.append(btnPrev, badge, btnNext); controls.appendChild(pager);
  }
  const isLastAi = (i === turns.findLastIndex(x => x.role === 'ai'));
  if (isLastAi) { const regenBtn = el('button', 'ctrl-btn'); regenBtn.textContent = '↻ regen'; regenBtn.onclick = () => regenMessage(i); controls.appendChild(regenBtn); }
  controls.appendChild(mkCopy(content)); body.append(bubble, controls); row.append(av, body); return row;
}

// ─── Formatting & Utilities ───────────────────────────────
async function executeCopy(text, btnNode) {
  let ok = false;
  if (navigator.clipboard && window.isSecureContext) { try { await navigator.clipboard.writeText(text); ok = true; } catch(e){} }
  if (!ok) { const ta = el('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;'; document.body.appendChild(ta); ta.select(); try { ok = document.execCommand('copy'); } catch(e){} document.body.removeChild(ta); }
  if (ok && btnNode) { const oldText = btnNode.textContent; btnNode.textContent = '✓ copied'; btnNode.classList.add('ok'); setTimeout(() => { btnNode.textContent = oldText; btnNode.classList.remove('ok'); }, 1800); } else if (!ok) { toast('Copy failed', 'err'); }
}
function mkCopy(text) { const btn = el('button', 'ctrl-btn'); btn.textContent = '⎘ copy'; btn.onclick = () => executeCopy(text, btn); return btn; }
window.copyCode = function(btn) { executeCopy(btn.closest('.code-block').querySelector('pre').textContent, btn); };
window.toggleCode = function(btn) { const block = btn.closest('.code-block'); block.classList.toggle('collapsed'); btn.textContent = block.classList.contains('collapsed') ? '▶ expand' : '▼ collapse'; };

function el(t, c) { const e = document.createElement(t); if(c) e.className = c; return e; }
function esc(s) { return (s || "").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function buildCodeBlock(lang, code) {
  return `<div class="code-block"><div class="code-header"><span class="code-lang">${lang || 'code'}</span><div class="code-actions"><button class="code-btn code-copy" onclick="copyCode(this)">⎘ copy</button><button class="code-btn code-collapse" onclick="toggleCode(this)">▼ collapse</button></div></div><pre><code>${code.trim()}</code></pre></div>`;
}

function fmt(t) {
  t = esc(t);
  let hasCode = false;
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => { hasCode = true; return buildCodeBlock(lang, code); });
  if (!hasCode) { const tr = t.trim(); if (tr.startsWith('&lt;!DOCTYPE') || tr.startsWith('&lt;html') || tr.startsWith('&lt;?php')) return buildCodeBlock('html/raw', tr); }
  t = t.replace(/^### (.*$)/gim, '<h3>$1</h3>');
  t = t.replace(/^## (.*$)/gim, '<h2>$1</h2>');
  t = t.replace(/^# (.*$)/gim, '<h1>$1</h1>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/^\s*[-*] (.*)/gim, '<li>$1</li>');
  t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  return t;
}

function scrollBottom() { const b = document.getElementById('chat-box'); requestAnimationFrame(() => b.scrollTop = b.scrollHeight); }
function autoResize(e) { e.style.height = 'auto'; e.style.height = Math.min(e.scrollHeight, 130) + 'px'; }
let toastTimer; function toast(msg, type = '') { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'show' + (type ? ' ' + type : ''); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.className = '', 2800); }
</script>
